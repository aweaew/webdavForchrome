<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>WebDAV 独立管理器 Pro</title>
  <script src="mammoth.browser.min.js"></script>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }
    
    .sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
    .sidebar-header { padding: 15px; background: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; }
    .sidebar-header button { background: #27ae60; border: none; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
    .account-list { flex: 1; overflow-y: auto; }
    .account-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .account-item:hover, .account-item.active { background: #e8f0fe; }
    .account-info { flex: 1; overflow: hidden; }
    .account-name { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .account-url { font-size: 12px; color: #888; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    
    .form-panel { padding: 15px; background: #fafafa; border-top: 1px solid #ddd; display: none; }
    .form-panel input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
    .form-panel button { width: 100%; padding: 8px; background: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 5px;}
    .form-panel .btn-cancel { background: #95a5a6; }

    .main-area { flex: 1; display: flex; flex-direction: column; background: #fff; min-width: 0; }
    
    .top-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #ecf0f1; border-bottom: 1px solid #ddd; gap: 10px; }
    .breadcrumb { font-size: 14px; display: flex; align-items: center; flex: 1; overflow: hidden; white-space: nowrap; }
    .breadcrumb span { cursor: pointer; color: #2980b9; }
    .breadcrumb span:hover { text-decoration: underline; }
    .breadcrumb .separator { margin: 0 8px; color: #7f8c8d; }
    
    .search-box input { padding: 6px 12px; border: 1px solid #ccc; border-radius: 20px; width: 150px; outline: none; transition: width 0.3s;}
    .search-box input:focus { width: 200px; border-color: #2980b9; }

    .action-group button { padding: 6px 10px; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; margin-left: 5px; font-size: 13px;}
    .action-group button:hover { background: #e8f0fe; border-color: #2980b9; color: #2980b9; }
    .action-group button:disabled { background: #eee; color: #999; border-color: #ddd; cursor: not-allowed; }
    #pasteBtn { background: #fdf2e9; border-color: #e67e22; color: #e67e22; display: none; }
    #pasteBtn:hover { background: #fae5d3; }

    .file-list { flex: 1; overflow-y: auto; padding: 0; margin: 0; }
    .list-header { display: grid; grid-template-columns: 30px minmax(200px, 2fr) 100px 150px 180px; padding: 10px 20px; background: #fafafa; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 13px; color: #555; position: sticky; top: 0; }
    
    .file-item { display: grid; grid-template-columns: 30px minmax(200px, 2fr) 100px 150px 180px; align-items: center; padding: 10px 20px; border-bottom: 1px solid #f1f1f1; font-size: 13px; transition: background 0.2s; }
    .file-item:hover { background: #f9f9f9; }
    
    .file-checkbox { display: flex; align-items: center; justify-content: center; }
    .file-name-col { display: flex; align-items: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .file-icon { font-size: 20px; margin-right: 10px; width: 25px; text-align: center; }
    .file-name { color: #333; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-name.folder { color: #2980b9; font-weight: 500; }
    .file-size, .file-date { color: #666; }
    
    .file-actions button { padding: 4px 8px; font-size: 12px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 4px; margin-right: 5px; }
    .file-actions button:hover { background: #eee; }
    .file-actions .btn-danger { color: #c0392b; }
    .file-actions .btn-danger:hover { background: #fadbd8; border-color: #e74c3c; }

    /* 预览弹窗样式 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-content { background: #fff; width: 80%; max-width: 800px; height: 80vh; display: flex; flex-direction: column; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
    .modal-header { padding: 15px 20px; background: #f8f9fa; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    .modal-header .close-btn { font-size: 24px; cursor: pointer; color: #666; line-height: 1; }
    .modal-header .close-btn:hover { color: #e74c3c; }
    .modal-body { flex: 1; padding: 20px; overflow: auto; display: flex; justify-content: center; align-items: center; background: #ecf0f1; position: relative;}
    
    #imagePreview { max-width: 100%; max-height: 100%; object-fit: contain; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
    #textEditor { width: 100%; height: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 4px; resize: none; font-family: monospace; font-size: 14px; outline: none; display: none; box-sizing: border-box; }
    #textEditor:focus { border-color: #2980b9; }
    
    #docxPreview { width: 100%; height: 100%; background: #fff; padding: 40px; box-sizing: border-box; overflow-y: auto; display: none; box-shadow: 0 0 10px rgba(0,0,0,0.1); font-family: sans-serif; line-height: 1.6;}
    
    .modal-footer { padding: 15px 20px; background: #fff; border-top: 1px solid #ddd; text-align: right; display: none; gap: 10px; justify-content: space-between; align-items: center; }
    .modal-footer button { padding: 8px 15px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    
    #saveEditBtn { background: #27ae60; }
    #saveEditBtn:hover { background: #2ecc71; }
    
    /* 压缩按钮组样式 */
    .compress-actions { display: none; gap: 10px; }
    #compressOverwriteBtn { background: #c0392b; }
    #compressOverwriteBtn:hover { background: #e74c3c; }
    #compressSaveAsBtn { background: #e67e22; }
    #compressSaveAsBtn:hover { background: #f39c12; }

    #globalMsg { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; display: none; z-index: 1001; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <span>配置管理</span>
      <button id="addProfileBtn">+ 新增网盘</button>
    </div>
    <div class="account-list" id="accountList"></div>
    <div class="form-panel" id="configForm">
      <input type="hidden" id="editId">
      <input type="text" id="confName" placeholder="配置名称">
      <input type="text" id="confUrl" placeholder="WebDAV 地址">
      <input type="text" id="confUser" placeholder="用户名">
      <input type="password" id="confPass" placeholder="密码">
      <button id="saveProfileBtn">保存配置</button>
      <button id="cancelProfileBtn" class="btn-cancel">取消</button>
    </div>
  </div>

  <div class="main-area">
    <div class="top-toolbar">
      <div class="breadcrumb" id="breadcrumb">等待选择网盘...</div>
      <div class="action-group">
        <button id="cutBtn" disabled title="选择文件后点击剪切">✂️ 剪切</button>
        <button id="pasteBtn" title="进入目标文件夹后点击粘贴">📋 粘贴</button>
        <button id="newFolderBtn" disabled>新建文件夹</button>
        <button id="uploadBtn" disabled>上传</button>
        <input type="file" id="fileUploader" style="display: none;" multiple>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="筛选..." disabled>
      </div>
    </div>
    
    <div class="list-header">
      <div class="file-checkbox"><input type="checkbox" id="selectAll"></div>
      <div>名称</div>
      <div>大小</div>
      <div>修改时间</div>
      <div>操作</div>
    </div>
    <div class="file-list" id="fileList"></div>
  </div>

  <div class="modal-overlay" id="previewModal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="previewTitle">文件预览</span>
        <span class="close-btn" id="closePreviewBtn">&times;</span>
      </div>
      <div class="modal-body">
        <img id="imagePreview" src="">
        <textarea id="textEditor"></textarea>
        <div id="docxPreview"></div>
      </div>
      <div class="modal-footer" id="modalFooter">
        <div class="compress-actions" id="compressActions">
            <button id="compressOverwriteBtn" title="高危：直接覆盖网盘中的原文件">压缩并覆盖原图</button>
            <button id="compressSaveAsBtn" title="安全：另存为一个新的 JPEG 文件">压缩并另存为...</button>
        </div>
        <div style="flex: 1; text-align: right;">
            <button id="saveEditBtn" style="display: none;">保存修改 (Ctrl+S)</button>
        </div>
      </div>
    </div>
  </div>

  <div id="globalMsg"></div>
  <script src="app.js"></script>
</body>
</html>
